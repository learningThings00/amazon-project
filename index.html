<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Project</title>

    <link rel="stylesheet" href="stylesheets/general.css" />
    <link rel="stylesheet" href="stylesheets/header.css" />
    <link rel="stylesheet" href="stylesheets/product-grid.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="amazon-header">
      <div class="header-left">
        <img
          src="images/logo/amazon-logo-white.png"
          alt="Amazon Logo"
          class="amazon-logo"
        />
      </div>

      <div class="header-middle">
        <input
          type="search"
          name="search"
          id="search"
          class="search-bar"
          placeholder="Search"
        />
        <button class="search-button">
          <img
            src="images/icons/search-icon.png"
            alt="
          Search Icon"
            class="search-icon"
          />
        </button>
      </div>

      <div class="header-right">
        <div class="order-section">
          <span class="return-text">Return</span>
          <span class="order-text">& Orders</span>
        </div>
        <div class="cart-container">
          <img
            src="images/icons/cart-icon.png"
            alt="Cart Icon"
            class="cart-icon"
          /><span class="cart-text">Cart</span>
          <span class="cart-notification">0</span>
        </div>
      </div>
    </header>
    <main>
      <div class="product-container">
        <div class="product-image-container">
          <img
            src="images/products/athletic-cotton-socks-6-pairs.jpg"
            alt="Socks Image"
            class="product-image"
          />
        </div>

        <div class="product-name">
          Black and Gray Athletic Cotton Socks - 6 Pairs
        </div>

        <div class="product-rating-container">
          <img
            src="images/ratings/rating-45.png"
            alt="4.5"
            class="rating-image"
          />
          <div class="product-rating-count">87</div>
        </div>

        <div class="product-price">$10.90</div>

        <div class="product-quantity-selector">
          <select name="quantity" id="quantity" class="select-quantity">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>

        <div class="added-message">
          <img src="images/icons/checkmark.png" alt="checkmark" />
          <div>Added</div>
        </div>

        <button class="add-to-cart-button">Add to Cart</button>
      </div>

      <div class="product-container">
        <div class="product-image-container">
          <img
            src="images/products/athletic-cotton-socks-6-pairs.jpg"
            alt="Socks Image"
            class="product-image"
          />
        </div>

        <div class="product-name">

        </div>

        <div class="product-rating-container">
          <img
            src="images/ratings/rating-45.png"
            alt="4.5"
            class="rating-image"
          />
          <div class="product-rating-count">87</div>
        </div>

        <div class="product-price">$10.90</div>

        <div class="product-quantity-selector">
          <select name="quantity" id="quantity">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>

        <div class="added-message">
          <img src="images/icons/checkmark.png" alt="checkmark" />
          <div>Added</div>
        </div>

        <button class="add-to-cart-button">Add to Cart</button>
      </div>

      <div class="product-container">
        <div class="product-image-container">
          <img
            src="images/products/athletic-cotton-socks-6-pairs.jpg"
            alt="Socks Image"
            class="product-image"
          />
        </div>

        <div class="product-name">
          Black and Gray Athletic Cotton Socks - 6 Pairs
        </div>

        <div class="product-rating-container">
          <img
            src="images/ratings/rating-45.png"
            alt="4.5"
            class="rating-image"
          />
          <div class="product-rating-count">87</div>
        </div>

        <div class="product-price">$10.90</div>

        <div class="product-quantity-selector">
          <select name="quantity" id="quantity">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>

        <div class="added-message">
          <img src="images/icons/checkmark.png" alt="checkmark" />
          <div>Added</div>
        </div>

        <button class="add-to-cart-button">Add to Cart</button>
      </div>
    </main>
  </body>
</html>
