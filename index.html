<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Project</title>

    <link rel="stylesheet" href="stylesheets/general.css" />
    <link rel="stylesheet" href="stylesheets/header.css" />
    <link rel="stylesheet" href="stylesheets/product-grid.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="amazon-header">
      <div class="header-left">
        <img
          src="images/logo/amazon-logo-white.png"
          alt="Amazon Logo"
          class="amazon-logo"
        />
      </div>

      <div class="header-middle">
        <input
          type="search"
          name="search"
          id="search"
          class="search-bar"
          placeholder="Search"
        />
        <button class="search-button">
          <img
            src="images/icons/search-icon.png"
            alt="
          Search Icon"
            class="search-icon"
          />
        </button>
      </div>

      <div class="header-right">
        <div class="order-section">
          <span class="return-text">Return</span>
          <span class="order-text">& Orders</span>
        </div>
        <div class="cart-container">
          <img
            src="images/icons/cart-icon.png"
            alt="Cart Icon"
            class="cart-icon"
          /><span class="cart-text">Cart</span>
          <span class="cart-notification">0</span>
        </div>
      </div>
    </header>
    <main class="product-grid js-product-display-container"></main>

    <script src="data/products.js"></script>
    <script src="scripts/main.js"></script>
  </body>
</html>
